name: Aviso de inscripciones (waitlist)

# Revisa a diario la tabla 'waitlist' del proyecto Supabase y, si hay inscripciones
# nuevas desde la ultima vez, abre un issue en este repo mencionando a @fersanhu
# (GitHub te envia el aviso por email). Usa la service_role key guardada como
# secreto del repo: SUPABASE_SERVICE_ROLE.

on:
  schedule:
    - cron: '19 8 * * *'    # cada dia a las 08:19 UTC
  workflow_dispatch:

permissions:
  contents: write            # para guardar la marca de "ya avisado"
  issues: write              # para crear el issue-aviso

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Buscar inscripciones nuevas
        env:
          SB_URL: https://hxjirgyobwwoydzdnemy.supabase.co
          SB_SERVICE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -z "$SB_SERVICE" ]; then
            echo "::warning::Falta el secreto SUPABASE_SERVICE_ROLE. Anadelo en Settings > Secrets > Actions."
            exit 0
          fi
          WM_FILE=.github/waitlist_seen.txt
          WM=$(cat "$WM_FILE" 2>/dev/null || echo "1970-01-01T00:00:00Z")
          echo "Ultima marca: $WM"
          RESP=$(curl -sS -m 30 --get "$SB_URL/rest/v1/waitlist" \
            --data-urlencode "select=email,source,created_at" \
            --data-urlencode "created_at=gt.$WM" \
            --data-urlencode "order=created_at.asc" \
            -H "apikey: $SB_SERVICE" -H "Authorization: Bearer $SB_SERVICE")
          N=$(echo "$RESP" | jq 'length' 2>/dev/null || echo 0)
          echo "Inscripciones nuevas: $N"
          if [ "$N" -gt 0 ]; then
            LISTA=$(echo "$RESP" | jq -r '.[] | "- " + .email + "  (" + ((.source // "-")|tostring) + " - " + .created_at + ")"')
            BODY=$(printf '@fersanhu nuevas inscripciones en el formulario de fersanhub.com:\n\n%s\n\nRevisa la tabla waitlist en Supabase (proyecto logopedia-wl).' "$LISTA")
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "🔔 $N nueva(s) inscripcion(es) en la waitlist" \
              --body "$BODY"
            NEWWM=$(echo "$RESP" | jq -r '.[-1].created_at')
            echo "$NEWWM" > "$WM_FILE"
            git config user.name "waitlist-bot"
            git config user.email "actions@users.noreply.github.com"
            git add "$WM_FILE"
            git commit -m "waitlist: marca actualizada ($NEWWM)"
            git push
          else
            echo "Sin novedades."
          fi
